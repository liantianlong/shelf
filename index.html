<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Books & Movies</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f8f7;--card:#fff;--border:#eaeaea;--text:#1a1a1a;--text2:#6b6b6b;
  --accent:#4f46e5;--hover:#f7f7f5;--thead:#fafbfc;--row-border:#f4f4f4;--radius:10px;
}
[data-theme="dark"]{
  --bg:#1a1a1b;--card:#252526;--border:#3a3a3c;--text:#e0e0e0;--text2:#999;
  --accent:#818cf8;--hover:#2d2d2f;--thead:#2d2d2f;--row-border:#333;
}
@media(prefers-color-scheme:dark){
  :root:not([data-theme="light"]){
    --bg:#1a1a1b;--card:#252526;--border:#3a3a3c;--text:#e0e0e0;--text2:#999;
    --accent:#818cf8;--hover:#2d2d2f;--thead:#2d2d2f;--row-border:#333;
  }
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;
}
.container{max-width:1200px;margin:0 auto;padding:24px 20px 60px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:10px}
header h1{font-size:22px;font-weight:700;letter-spacing:.02em}
.header-right{display:flex;align-items:center;gap:8px}
.icon-btn{
  width:32px;height:32px;border-radius:7px;border:1px solid var(--border);
  background:var(--card);color:var(--text2);cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.tabs{display:inline-flex;gap:4px;background:var(--hover);border-radius:10px;padding:4px}
.tab{
  padding:8px 20px;font-size:14px;font-weight:500;
  border:none;background:transparent;color:var(--text2);
  cursor:pointer;border-radius:7px;transition:all .2s;
}
.tab:hover{color:var(--text)}
.tab.active{background:var(--accent);color:#fff}
.toolbar{
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:8px 14px;transition:border-color .2s;
}
.toolbar:focus-within{border-color:var(--accent)}
.toolbar input{
  flex:1;border:none;outline:none;font-size:14px;background:transparent;color:var(--text);
}
.toolbar input::placeholder{color:#bbb}
.table-wrap{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
thead{background:var(--thead);border-bottom:2px solid var(--border)}
th{
  padding:10px 14px;text-align:left;font-weight:600;font-size:12px;
  color:var(--text2);white-space:nowrap;
  user-select:none;text-transform:uppercase;letter-spacing:.04em;
}
th.sortable{cursor:pointer;transition:color .15s}
th.sortable:hover{color:var(--accent)}
th.sorted{color:var(--accent)}
th .arrow{font-size:11px;margin-left:3px;opacity:.35}
th.sorted .arrow{opacity:1}
td{padding:9px 14px;border-bottom:1px solid var(--row-border)}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s}
tbody tr:hover{background:var(--hover)}
.link{color:var(--accent);text-decoration:none;font-weight:500}
.link:hover{text-decoration:underline}
.stars{letter-spacing:1px}
.empty{color:#ccc}
.status-badge{white-space:nowrap;font-size:13px}
.no-result{text-align:center;padding:40px;color:#bbb;font-size:14px}

/* Tag colors */
.tag{display:inline-block;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;margin:1px 2px;white-space:nowrap}
.tag-default{background:#f3f4f6;color:#6b7280}
.tag-小说{background:#fff0f3;color:#c9184a}
.tag-哲学{background:#f5f0ff;color:#7c3aed}
.tag-科普{background:#eef4ff;color:#2563eb}
.tag-社科{background:#ecfdf5;color:#059669}
.tag-经济{background:#fffbf0;color:#d97706}
.tag-理工{background:#f0fdfa;color:#0d9488}
.tag-诗集{background:#fdf2f8;color:#c02669}
.tag-论文{background:#f1f5f9;color:#475569}
.tag-量子场论{background:#eef2ff;color:#4f46e5}
.tag-剧情{background:#eef4ff;color:#2563eb}
.tag-悬疑{background:#f3eeff;color:#6d28d9}
.tag-爱情{background:#fdf2f8;color:#be185d}
.tag-科幻{background:#ecfdfa;color:#0f766e}
.tag-动画{background:#ecfdf5;color:#16a34a}
.tag-动作{background:#fef2f2;color:#dc2626}
.tag-喜剧{background:#fff7ed;color:#ea580c}
.tag-冒险{background:#fffbf0;color:#b45309}
.tag-惊悚{background:#fef2f2;color:#b91c1c}
.tag-历史{background:#fefce8;color:#a16207}
.tag-音乐{background:#eef2ff;color:#4338ca}
.tag-传记{background:#ecfdfa;color:#115e59}
.tag-家庭{background:#ecfdf5;color:#15803d}
.tag-奇幻{background:#f5f0ff;color:#6d28d9}
.tag-同性{background:#fff0f3;color:#c9184a}
.tag-犯罪{background:#f1f5f9;color:#334155}

/* Header dropdowns */
.has-filter{position:relative;overflow:visible;cursor:pointer;user-select:none}
.has-filter:hover{color:var(--text)}
.filter-arrow{font-size:9px;margin-left:2px;color:#bbb;transition:color .15s}
.has-filter:hover .filter-arrow{color:var(--accent)}
.dropdown{
  display:none;position:absolute;top:100%;left:0;z-index:100;
  background:var(--card);border:1px solid var(--border);border-radius:8px;
  box-shadow:0 4px 16px rgba(0,0,0,.15);min-width:150px;max-height:260px;
  overflow-y:auto;padding:4px 0;
}
.dropdown.show{display:block}
.dropdown .item{
  display:block;width:100%;padding:6px 14px;font-size:13px;text-align:left;
  border:none;background:none;color:var(--text);cursor:pointer;
  font-weight:400;letter-spacing:0;text-transform:none;white-space:nowrap;
}
.dropdown .item:hover{background:var(--hover)}
.dropdown .item.selected{color:var(--accent);font-weight:600}

.tab-panel{display:none}
.tab-panel.active{display:block}
.header-search{width:170px;margin-bottom:0;padding:4px 10px;flex-shrink:0}
footer{text-align:center;margin-top:32px;font-size:12px;color:var(--text2)}

@media(max-width:640px){
  .container{padding:14px 10px 40px}
  header h1{font-size:20px}
  .tab{padding:7px 14px;font-size:13px}
  .header-search{width:120px}
  table{font-size:12px}
  th,td{padding:7px 8px}
}
</style>
</head>
<body>
<div class="container">

<header>
  <h1>My Books & Movies</h1>
  <div class="header-right">
    <div class="toolbar header-search" id="search-books-wrap">
      <input type="text" id="search-books" data-lang="search-books" placeholder="Search books..." oninput="filterTable('books')">
    </div>
    <div class="toolbar header-search" id="search-movies-wrap" style="display:none">
      <input type="text" id="search-movies" data-lang="search-movies" placeholder="Search movies..." oninput="filterTable('movies')">
    </div>
    <button class="icon-btn" onclick="toggleLang()" title="zh/en" id="lang-btn">中</button>
    <button class="icon-btn" onclick="toggleTheme()" title="Theme" id="theme-btn">🌓</button>
    <div class="tabs">
      <button class="tab active" data-lang="tab-books" onclick="switchTab('books')">Reading</button>
      <button class="tab" data-lang="tab-movies" onclick="switchTab('movies')">Watching</button>
    </div>
  </div>
</header>

<div class="tab-panel active" id="panel-books">
  <div class="table-wrap">
    <div class="table-scroll">
      <table id="table-books">
        <thead><tr>
          <th data-lang="th-title">Title</th>
          <th data-lang="th-author">Author</th>
          <th class="has-filter" onclick="toggleDropdown(event,'books-tags')"><span data-lang="th-tags">Tags</span> <span class="filter-arrow">&#9662;</span></th>
          <th class="sortable" onclick="sortTable('books',this)"><span data-lang="th-date">Date</span> <span class="arrow">&#8645;</span></th>
          <th class="has-filter" onclick="toggleDropdown(event,'books-status')"><span data-lang="th-status">Status</span> <span class="filter-arrow">&#9662;</span></th>
        </tr></thead>
        <tbody id="books-tbody"></tbody>
      </table>
    </div>
    <div class="no-result" id="books-empty" style="display:none">No matching results</div>
  </div>
</div>

<div class="tab-panel" id="panel-movies">
  <div class="table-wrap">
    <div class="table-scroll">
      <table id="table-movies">
        <thead><tr>
          <th data-lang="th-title">Title</th>
          <th data-lang="th-region">Region</th>
          <th class="has-filter" onclick="toggleDropdown(event,'movies-type')"><span data-lang="th-type">Type</span> <span class="filter-arrow">&#9662;</span></th>
          <th class="has-filter" onclick="toggleDropdown(event,'movies-tags')"><span data-lang="th-tags">Tags</span> <span class="filter-arrow">&#9662;</span></th>
          <th class="has-filter" onclick="toggleDropdown(event,'movies-rating')"><span data-lang="th-rating">Rating</span> <span class="filter-arrow">&#9662;</span></th>
          <th class="sortable" onclick="sortTable('movies',this)"><span data-lang="th-date">Date</span> <span class="arrow">&#8645;</span></th>
        </tr></thead>
        <tbody id="movies-tbody"></tbody>
      </table>
    </div>
    <div class="no-result" id="movies-empty" style="display:none">No matching results</div>
  </div>
</div>

<footer></footer>

</div>

BOOKS.sort(function(a,b){return parseDate(b.date)-parseDate(a.date)});
MOVIES.sort(function(a,b){return parseDate(b.date)-parseDate(a.date)});

// --- Theme ---
var theme=localStorage.getItem('theme')||'auto';
function applyTheme(){
  var prefersDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  var isDark=theme==='dark'||(theme==='auto'&&prefersDark);
  document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
  document.getElementById('theme-btn').textContent=theme==='auto'?'🌓':isDark?'🌙':'☀';
}
function toggleTheme(){
  theme=theme==='auto'?'dark':theme==='dark'?'light':'auto';
  localStorage.setItem('theme',theme);applyTheme();
}
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',function(){if(theme==='auto')applyTheme()});

// --- Rendering ---
var TAG_COLORS={
  "小说":"小说","哲学":"哲学","科普":"科普","社科":"社科","经济":"经济",
  "理工":"理工","诗集":"诗集","论文":"论文","量子场论":"量子场论",
  "剧情":"剧情","悬疑":"悬疑","爱情":"爱情","科幻":"科幻","动画":"动画",
  "动作":"动作","喜剧":"喜剧","冒险":"冒险","惊悚":"惊悚","历史":"历史",
  "音乐":"音乐","传记":"传记","家庭":"家庭","奇幻":"奇幻","同性":"同性","犯罪":"犯罪"
};
function getTagClass(tag){var t=tag.trim();return TAG_COLORS[t]?'tag tag-'+TAG_COLORS[t]:'tag tag-default'}
function tagHtml(raw){
  if(!raw)return'<span class="empty">-</span>';
  var tags=raw.replace(/,/g,',').split(',');
  var out='';
  tags.forEach(function(t){t=t.trim();if(t)out+='<span class="'+getTagClass(t)+'">'+t+'</span>'});
  return out||'<span class="empty">-</span>';
}

function switchTab(type){
  document.querySelectorAll('.tab').forEach(function(t,i){
    t.classList.toggle('active',(type==='books'&&i===0)||(type==='movies'&&i===1));
  });
  document.getElementById('panel-books').classList.toggle('active',type==='books');
  document.getElementById('panel-movies').classList.toggle('active',type==='movies');
  document.getElementById('search-books-wrap').style.display=type==='books'?'':'none';
  document.getElementById('search-movies-wrap').style.display=type==='movies'?'':'none';
}

function renderBooks(data){
  var tbody=document.getElementById('books-tbody');
  if(!data.length){tbody.innerHTML='';document.getElementById('books-empty').style.display='block';return}
  document.getElementById('books-empty').style.display='none';
  var sm={'已读':'✅','在读':'📖','暂弃':'⏸️','粗读':'📝'};
  var html='';
  data.forEach(function(b){
    var author=b.author||'<span class="empty">-</span>';
    var date=b.date||'<span class="empty">-</span>';
    var status=b.status||'-';
    var emoji=sm[status]||'📌';
    var title=b.link?'<a class="link" href="'+b.link+'" target="_blank">'+b.title+'</a>':b.title;
    html+='<tr><td>'+title+'</td><td>'+author+'</td><td>'+tagHtml(b.tags)+'</td><td style="white-space:nowrap">'+date+'</td><td><span class="status-badge">'+emoji+' '+status+'</span></td></tr>';
  });
  tbody.innerHTML=html;
}

function renderMovies(data){
  var tbody=document.getElementById('movies-tbody');
  if(!data.length){tbody.innerHTML='';document.getElementById('movies-empty').style.display='block';return}
  document.getElementById('movies-empty').style.display='none';
  var html='';
  data.forEach(function(m){
    var country=m.country||'<span class="empty">-</span>';
    var mtype=m.type||'<span class="empty">-</span>';
    var date=m.date||'<span class="empty">-</span>';
    var sc=(m.rating.match(/🌟/g)||[]).length;
    var stars=sc>0?'<span class="stars">'+'⭐'.repeat(sc)+'</span>':'<span class="empty">-</span>';
    var title=m.douban?'<a class="link" href="'+m.douban+'" target="_blank">'+m.title+'</a>':m.title;
    html+='<tr><td>'+title+'</td><td>'+country+'</td><td>'+mtype+'</td><td>'+tagHtml(m.tags)+'</td><td>'+stars+'</td><td style="white-space:nowrap">'+date+'</td></tr>';
  });
  tbody.innerHTML=html;
}


// --- Dropdowns ---
function getUniqueTags(source,field){
  var set={};
  source.forEach(function(item){
    var raw=item[field]||'';
    raw.replace(/,/g,',').split(',').forEach(function(t){t=t.trim();if(t)set[t]=true});
  });
  return Object.keys(set).sort();
}
function ce(tag,cls,id,html){var e=document.createElement(tag);e.className=cls;if(id)e.id=id;e.innerHTML=html;return e}
function buildDropdown(id,options,labelFn){
  var html='<button class="item selected" data-val="" onclick="setFilter(\''+id+'\',\'\')">'+t('all')+'</button>';
  options.forEach(function(opt){
    var label=labelFn?labelFn(opt):opt;
    html+='<button class="item" data-val="'+opt+'" onclick="setFilter(\''+id+'\',\''+opt.replace(/'/g,"\\'")+'\')">'+label+'</button>';
  });
  return html;
}
function clearDropdowns(){
  document.querySelectorAll('.dropdown').forEach(function(d){d.remove()});
}
function initDropdowns(){
  clearDropdowns();
  var bth=document.querySelectorAll('#table-books th');
  var bookTags=getUniqueTags(BOOKS,'tags');
  bth[2].appendChild(ce('div','dropdown','dd-books-tags',buildDropdown('books-tags',bookTags)));
  bth[4].appendChild(ce('div','dropdown','dd-books-status',buildDropdown('books-status',['已读','在读','暂弃','粗读'])));
  var mth=document.querySelectorAll('#table-movies th');
  mth[2].appendChild(ce('div','dropdown','dd-movies-type',buildDropdown('movies-type',['电影','剧集'])));
  var movieTags=getUniqueTags(MOVIES,'tags');
  mth[3].appendChild(ce('div','dropdown','dd-movies-tags',buildDropdown('movies-tags',movieTags)));
  mth[4].appendChild(ce('div','dropdown','dd-movies-rating',buildDropdown('movies-rating',['1','2','3','4','5'],function(n){return'⭐'.repeat(parseInt(n))})));
}
function toggleDropdown(e,id){
  e.stopPropagation();
  var dd=document.getElementById('dd-'+id);
  var isOpen=dd.classList.contains('show');
  closeAllDropdowns();
  if(!isOpen)dd.classList.add('show');
}
function closeAllDropdowns(){
  document.querySelectorAll('.dropdown').forEach(function(d){d.classList.remove('show')});
}
function setFilter(id,value){
  filters[id]=value;closeAllDropdowns();
  var dd=document.getElementById('dd-'+id);
  dd.querySelectorAll('.item').forEach(function(item){
    item.classList.toggle('selected',item.getAttribute('data-val')===value);
  });
  filterTable(id.split('-')[0]);
}
document.addEventListener('click',function(){closeAllDropdowns()});

// --- Sort (date only) ---
function sortTable(type,th){
  var state=type==='books'?bookSort:movieSort;
  state.dir=(state.dir+1)%3;
  th.classList.toggle('sorted',state.dir>0);
  th.querySelector('.arrow').textContent=state.dir===0?'⇅':state.dir===1?'↑':'↓';
  var data=(type==='books'?bookData:movieData).slice();
  if(state.dir>0){data.sort(function(a,b){var va=parseDate(a.date),vb=parseDate(b.date);return state.dir===1?vb-va:va-vb})}
  else{data.sort(function(a,b){return parseDate(b.date)-parseDate(a.date)})}
  if(type==='books'){bookData=data;renderBooks(data)}else{movieData=data;renderMovies(data)}
}

// --- Filter ---
function filterTable(type){
  var query=document.getElementById('search-'+type).value.toLowerCase();
  var source=type==='books'?BOOKS:MOVIES;
  var state=type==='books'?bookSort:movieSort;
  var data=source.slice();
  if(state.dir>0){data.sort(function(a,b){var va=parseDate(a.date),vb=parseDate(b.date);return state.dir===1?vb-va:va-vb})}
  else{data.sort(function(a,b){return parseDate(b.date)-parseDate(a.date)})}
  if(type==='books'){
    if(filters['books-tags'])data=data.filter(function(b){return(b.tags||'').indexOf(filters['books-tags'])!==-1});
    if(filters['books-status'])data=data.filter(function(b){return b.status===filters['books-status']});
  }else{
    if(filters['movies-type'])data=data.filter(function(m){return m.type===filters['movies-type']});
    if(filters['movies-tags'])data=data.filter(function(m){return(m.tags||'').indexOf(filters['movies-tags'])!==-1});
    if(filters['movies-rating'])data=data.filter(function(m){return(m.rating.match(/🌟/g)||[]).length===parseInt(filters['movies-rating'])});
  }
  if(query){data=data.filter(function(item){return Object.values(item).join(' ').toLowerCase().indexOf(query)!==-1})}
  if(type==='books'){bookData=data;renderBooks(data)}else{movieData=data;renderMovies(data)}
}

// --- Lang apply ---
function applyLang(){
  document.querySelectorAll('[data-lang]').forEach(function(el){
    var k=el.getAttribute('data-lang');
    if(el.tagName==='INPUT')el.placeholder=t(k);else el.textContent=t(k);
  });
  document.querySelectorAll('.tab').forEach(function(tab){var k=tab.getAttribute('data-lang');if(k)tab.textContent=t(k)});
  document.getElementById('lang-btn').textContent=lang==='en'?'中':'EN';
  document.getElementById('books-empty').textContent=t('no-result');
  document.getElementById('movies-empty').textContent=t('no-result');
  renderBooks(bookData);renderMovies(movieData);
  initDropdowns();
  updateFooter();
}
function toggleLang(){lang=lang==='en'?'zh':'en';localStorage.setItem('lang',lang);applyLang()}

// --- Footer ---
function updateFooter(){
  var f=document.querySelector('footer');
  var d=new Date(); var ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  if(f)f.innerHTML=ds+' &middot; '+BOOKS.length+' books / '+MOVIES.length+' screens';
}

// Init
applyTheme();
initDropdowns();
renderBooks(bookData);
renderMovies(movieData);
updateFooter();
if(lang==='zh')applyLang();
else document.getElementById('lang-btn').textContent='中';
</script>
</body>
